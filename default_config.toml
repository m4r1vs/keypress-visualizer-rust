show_in_tray = true

[mappings]
LEFTMETA = "⌘"
RIGHTMETA = "⌘"
LEFTSHIFT = "⇧"
RIGHTSHIFT = "⇧"
LEFTCTRL = "^"
RIGHTCTRL = "^"
LEFTALT = "⎇"
RIGHTALT = "⎇"
ENTER = "↵"
BACKSPACE = "⌫"
SPACE = "␣"
TAB = "↹"
ESC = "ESC"
CAPSLOCK = "CAPS"

[appearance]
font_size = 52
anchor = "top"
margin_x = 0
margin_y = 50
pos_x_pct = 0.0
pos_y_pct = 0.0
max_keys = 1
custom_css = "default_style.css"
spam_threshold = 4
spam_hold_ms = 500

